<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cfc"/>
      <stop offset="100%" style="stop-color:#5c3ce8"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#3dbdb5"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#e85555"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66"/>
      <stop offset="100%" style="stop-color:#40c057"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Grid lines -->
  <line x1="20" y1="64" x2="108" y2="64" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="64" y1="20" x2="64" y2="108" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <!-- Connection arrows -->
  <line x1="44" y1="48" x2="80" y2="48" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="82,48 74,43 74,53" fill="rgba(255,255,255,0.6)"/>
  <line x1="80" y1="52" x2="80" y2="78" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="80,81 75,73 85,73" fill="rgba(255,255,255,0.6)"/>
  <!-- Node 1: Process (rounded rect) -->
  <rect x="24" y="30" width="24" height="18" rx="4" fill="url(#node1)" filter="url(#shadow)"/>
  <text x="36" y="41" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="700">A</text>
  <!-- Node 2: Decision (diamond) -->
  <polygon points="98,48 110,57 98,66 86,57" fill="url(#node2)" filter="url(#shadow)"/>
  <text x="98" y="60" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="700">?</text>
  <!-- Node 3: End (pill) -->
  <rect x="68" y="78" width="24" height="18" rx="9" fill="url(#node3)" filter="url(#shadow)"/>
  <text x="80" y="89" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="700">B</text>
  <!-- Connection dots -->
  <circle cx="48" cy="48" r="2.5" fill="#fff"/>
  <circle cx="80" cy="48" r="2.5" fill="#fff"/>
  <!-- Subtle glow ring -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>
